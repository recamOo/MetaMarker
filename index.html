<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Metas - Dark Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #202024;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        h2 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a8a8b3;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: #121214;
            border: 2px solid #29292e;
            border-radius: 6px;
            font-size: 16px;
            color: #ffffff;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #4a90e2;
            outline: none;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        button {
            flex: 2;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #357abd;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-reset {
            flex: 1;
            background-color: #f75a68;
        }
        .btn-reset:hover {
            background-color: #c53b47;
        }
        .progress-container {
            background-color: #29292e;
            border-radius: 10px;
            height: 28px;
            width: 100%;
            margin-top: 30px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: hsl(0, 100%, 50%);
            transition: width 0.4s ease, background-color 0.4s ease;
        }
        .status-text {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #e1e1e6;
        }
        
        /* Seção do Histórico */
        .history-section {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid #29292e;
            padding-top: 20px;
        }
        .history-section h3 {
            font-size: 16px;
            color: #a8a8b3;
            margin-top: 0;
            margin-bottom: 12px;
        }
        .history-list {
            max-height: 180px;
            overflow-y: auto;
            padding-right: 5px;
        }
        /* Customizando a barra de rolagem do histórico */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #29292e;
            border-radius: 3px;
        }
        .history-item {
            background-color: #121214;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00b37e;
            animation: fadeIn 0.3s ease;
        }
        .history-value {
            font-weight: bold;
            color: #00b37e;
            font-size: 15px;
        }
        .history-date {
            color: #7c7c8a;
            font-size: 12px;
        }
        .empty-history {
            color: #7c7c8a;
            font-style: italic;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Minha Meta 🎯</h2>
    
    <div class="input-group">
        <label for="metaTotal">Meta Total:</label>
        <input type="number" id="metaTotal" placeholder="Ex: 1000" min="1">
    </div>
    
    <div class="input-group">
        <label for="valorObtido">Valor Obtido (a somar):</label>
        <input type="number" id="valorObtido" placeholder="Ex: 150" min="1">
    </div>
    
    <div class="button-group">
        <button onclick="adicionarValor()">Somar Valor</button>
        <button class="btn-reset" onclick="reiniciarMeta()">Resetar</button>
    </div>

    <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
    </div>
    
    <div class="status-text" id="statusText">
        Progresso: 0 / 0 (0%)
    </div>

    <div class="history-section">
        <h3>Histórico de Lançamentos</h3>
        <div id="historyList" class="history-list">
            </div>
    </div>
</div>

<script>
    let progressoAcumulado = 0;
    let historicoLancamentos = [];

    // Executa automaticamente ao carregar a página
    window.onload = function() {
        const metaSalva = localStorage.getItem('metaTotal_dark');
        const progressoSalvo = localStorage.getItem('progressoAcumulado_dark');
        const historicoSalvo = localStorage.getItem('historicoLancamentos_dark');

        if (metaSalva) {
            document.getElementById('metaTotal').value = metaSalva;
        }
        if (progressoSalvo) {
            progressoAcumulado = parseFloat(progressoSalvo);
        }
        if (historicoSalvo) {
            historicoLancamentos = JSON.parse(historicoSalvo);
        }

        atualizarInterface();
    };

    function adicionarValor() {
        const metaTotalInput = document.getElementById('metaTotal');
        const valorObtidoInput = document.getElementById('valorObtido');

        const metaTotal = parseFloat(metaTotalInput.value);
        const valorNovo = parseFloat(valorObtidoInput.value);

        if (isNaN(metaTotal) || metaTotal <= 0) {
            alert("Por favor, defina uma Meta Total válida antes de somar.");
            return;
        }
        if (isNaN(valorNovo) || valorNovo <= 0) {
            alert("Por favor, insira um Valor Obtido válido.");
            return;
        }

        progressoAcumulado += valorNovo;

        // Impede que o progresso visual passe de 100%
        if (progressoAcumulado > metaTotal) {
            progressoAcumulado = metaTotal;
        }

        // Captura a data e hora atual formatada
        const agora = new Date();
        const dataFormatada = agora.toLocaleDateString('pt-BR');
        const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const timestamp = `${dataFormatada} às ${horaFormatada}`;

        // Adiciona o novo lançamento no INÍCIO do array do histórico (mais recente primeiro)
        historicoLancamentos.unshift({
            valor: valorNovo,
            dataHora: timestamp
        });

        // Salva tudo atualizado no localStorage
        localStorage.setItem('metaTotal_dark', metaTotal);
        localStorage.setItem('progressoAcumulado_dark', progressoAcumulado);
        localStorage.setItem('historicoLancamentos_dark', JSON.stringify(historicoLancamentos));

        atualizarInterface();

        // Limpa o input de valor obtido
        valorObtidoInput.value = '';
    }

    function atualizarInterface() {
        const metaTotalInput = document.getElementById('metaTotal');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const historyList = document.getElementById('historyList');

        const metaTotal = parseFloat(metaTotalInput.value) || 0;

        if (metaTotal === 0) {
            progressBar.style.width = '0%';
            progressBar.style.backgroundColor = 'hsl(0, 100%, 50%)';
            statusText.innerText = 'Progresso: 0 / 0 (0%)';
        } else {
            const porcentagem = (progressoAcumulado / metaTotal) * 100;
            progressBar.style.width = porcentagem + "%";

            // Transição HSL do Vermelho (0) ao Verde (120)
            const tomCor = (porcentagem / 100) * 120;
            progressBar.style.backgroundColor = `hsl(${tomCor}, 100%, 45%)`;

            statusText.innerText = `Progresso: ${progressoAcumulado.toFixed(2)} / ${metaTotal.toFixed(2)} (${porcentagem.toFixed(1)}%)`;
        }

        // Renderiza o Histórico na Tela
        historyList.innerHTML = '';
        if (historicoLancamentos.length === 0) {
            historyList.innerHTML = '<div class="empty-history">Nenhum lançamento efetuado.</div>';
        } else {
            historicoLancamentos.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                itemDiv.innerHTML = `
                    <span class="history-value">+ R$ ${item.valor.toFixed(2)}</span>
                    <span class="history-date">${item.dataHora}</span>
                `;
                historyList.appendChild(itemDiv);
            });
        }
    }

    function reiniciarMeta() {
        if (confirm("Tem certeza que deseja resetar a meta e apagar todo o histórico?")) {
            progressoAcumulado = 0;
            historicoLancamentos = [];

            // Limpa as chaves específicas do localStorage
            localStorage.removeItem('metaTotal_dark');
            localStorage.removeItem('progressoAcumulado_dark');
            localStorage.removeItem('historicoLancamentos_dark');

            document.getElementById('metaTotal').value = '';
            document.getElementById('valorObtido').value = '';
            
            atualizarInterface();
        }
    }
</script>

</body>
</html>
